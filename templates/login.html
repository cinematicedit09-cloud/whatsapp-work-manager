<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBot AI — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#1a1a1a;--bg-card:#242424;--bg-input:#2d2d2d;
            --text:#ececec;--text-secondary:#a0a0a0;--text-dim:#6b6b6b;
            --accent:#7c6fe0;--accent-hover:#6b5dd3;
            --border:#3d3d3d;--danger:#f44336;--success:#4caf50;
        }
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .glow{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(120px);opacity:.08;pointer-events:none}
        .g1{top:-150px;left:-150px;background:var(--accent)}
        .g2{bottom:-150px;right:-150px;background:#06b6d4}
        .card{width:380px;max-width:92vw;padding:36px;background:var(--bg-card);border-radius:16px;border:1px solid var(--border);position:relative;z-index:1}
        .card-header{text-align:center;margin-bottom:28px}
        .card-icon{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:12px;background:var(--accent);color:#fff;font-size:1.2rem;margin-bottom:12px}
        .card-header h1{font-size:1.3rem;font-weight:600;margin-bottom:4px}
        .card-header p{font-size:0.8rem;color:var(--text-secondary)}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:0.72rem;color:var(--text-secondary);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
        .form-group input{width:100%;padding:12px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.88rem;outline:none;transition:border-color .2s}
        .form-group input:focus{border-color:var(--accent)}
        .submit-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:0.88rem;font-weight:600;cursor:pointer;margin-top:8px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
        .submit-btn:hover{background:var(--accent-hover);transform:translateY(-1px)}
        .submit-btn:disabled{opacity:.5;transform:none;cursor:not-allowed}
        .toggle-row{text-align:center;margin-top:18px;font-size:0.78rem}
        .toggle-row span{color:var(--text-dim)}
        .toggle-row button{background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font-size:0.78rem}
        .toggle-row button:hover{text-decoration:underline}
        .error{color:var(--danger);font-size:0.75rem;text-align:center;margin-top:12px;display:none}
        .error.show{display:block}
        .features{display:flex;gap:6px;justify-content:center;margin-top:20px;flex-wrap:wrap}
        .feat{padding:4px 10px;background:var(--bg-input);border-radius:20px;font-size:0.62rem;color:var(--text-dim);border:1px solid var(--border)}
    </style>
</head>
<body>
    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="card">
        <div class="card-header">
            <div class="card-icon"><i class="fas fa-bolt"></i></div>
            <h1 id="formTitle">Sign in to WorkBot</h1>
            <p id="formSubtitle">Your professional AI assistant</p>
        </div>
        <form onsubmit="handleSubmit(event)" id="authForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-arrow-right"></i> <span id="btnText">Sign In</span></button>
        </form>
        <div class="toggle-row">
            <span id="toggleLabel">Don't have an account?</span>
            <button onclick="toggle()" id="toggleBtn">Create one</button>
        </div>
        <div class="error" id="errorMsg"></div>
        <div class="features">
            <span class="feat">AI Chat</span>
            <span class="feat">Task Manager</span>
            <span class="feat">Code Help</span>
            <span class="feat">Video Editing</span>
            <span class="feat">Planning</span>
        </div>
    </div>
    <script>
    let mode='login';
    function toggle(){
        mode=mode==='login'?'signup':'login';
        document.getElementById('formTitle').textContent=mode==='login'?'Sign in to WorkBot':'Create your account';
        document.getElementById('formSubtitle').textContent=mode==='login'?'Your professional AI assistant':'Free forever. No credit card.';
        document.getElementById('btnText').textContent=mode==='login'?'Sign In':'Create Account';
        document.getElementById('toggleLabel').textContent=mode==='login'?"Don't have an account?":'Already have an account?';
        document.getElementById('toggleBtn').textContent=mode==='login'?'Create one':'Sign in';
        document.getElementById('errorMsg').classList.remove('show');
    }
    async function handleSubmit(e){
        e.preventDefault();
        const btn=document.getElementById('submitBtn'),err=document.getElementById('errorMsg');
        btn.disabled=true;
        document.getElementById('btnText').textContent='Please wait...';
        err.classList.remove('show');
        const username=document.getElementById('username').value.trim();
        const password=document.getElementById('password').value;
        const endpoint=mode==='login'?'/api/login':'/api/signup';
        try{
            const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
            const data=await res.json();
            if(data.success){window.location.href='/'}
            else{err.textContent=data.error||'Something went wrong';err.classList.add('show')}
        }catch(ex){err.textContent='Connection error. Try again.';err.classList.add('show')}
        btn.disabled=false;
        document.getElementById('btnText').textContent=mode==='login'?'Sign In':'Create Account';
    }
    </script>
</body>
</html>
