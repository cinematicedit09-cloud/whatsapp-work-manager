<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBot - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --secondary: #06b6d4;
            --bg-dark: #0f0f0f;
            --bg-card: #171717;
            --bg-input: #1e1e1e;
            --text: #f5f5f5;
            --text-muted: #a3a3a3;
            --border: #2e2e2e;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-container {
            width: 400px;
            max-width: 90vw;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .login-logo {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, opacity 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .error-msg {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 12px;
            display: none;
        }
        .error-msg.show { display: block; }
        .bg-glow {
            position: fixed;
            width: 300px; height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; background: var(--primary); }
        .glow-2 { bottom: -100px; right: -100px; background: var(--secondary); }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="login-container">
        <div class="login-logo"><i class="fas fa-bolt"></i></div>
        <div class="login-title">WorkBot</div>
        <div class="login-subtitle">Your AI Personal Work Manager</div>

        <form onsubmit="handleLogin(event)" id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <div style="text-align:center;margin-top:16px;">
            <span style="color:var(--text-muted);font-size:0.8rem;">Don't have an account?</span>
            <button onclick="toggleSignup()" style="background:none;border:none;color:var(--primary);font-size:0.85rem;font-weight:600;cursor:pointer;text-decoration:underline;" id="toggleBtn">Sign Up</button>
        </div>
        <div class="error-msg" id="errorMsg">Invalid username or password</div>
    </div>

    <script>
    let isSignup = false;

    function toggleSignup() {
        isSignup = !isSignup;
        const btn = document.getElementById('loginBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const subtitle = document.querySelector('.login-subtitle');
        if (isSignup) {
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            toggleBtn.textContent = 'Sign In';
            subtitle.textContent = 'Create your free account';
            document.querySelector('[onclick="toggleSignup()"]').previousElementSibling.textContent = 'Already have an account?';
        } else {
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            toggleBtn.textContent = 'Sign Up';
            subtitle.textContent = 'Your AI Personal Work Manager';
            document.querySelector('[onclick="toggleSignup()"]').previousElementSibling.textContent = "Don't have an account?";
        }
        document.getElementById('errorMsg').classList.remove('show');
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('errorMsg');
        
        btn.disabled = true;
        btn.innerHTML = isSignup ? '<i class="fas fa-spinner fa-spin"></i> Creating...' : '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        errorEl.classList.remove('show');

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const endpoint = isSignup ? '/api/signup' : '/api/login';

        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = '/';
            } else {
                errorEl.textContent = data.error || 'Something went wrong';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = isSignup ? '<i class="fas fa-user-plus"></i> Create Account' : '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        } catch(e) {
            errorEl.textContent = 'Connection error. Try again.';
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.innerHTML = isSignup ? '<i class="fas fa-user-plus"></i> Create Account' : '<i class="fas fa-sign-in-alt"></i> Sign In';
        }
    }
    </script>
</body>
</html>
