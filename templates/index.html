<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBot AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#1a1a1a;--bg-secondary:#242424;--bg-tertiary:#2d2d2d;--bg-hover:#333;
            --border:#3d3d3d;--border-light:#4d4d4d;
            --text:#ececec;--text-secondary:#a0a0a0;--text-dim:#6b6b6b;
            --accent:#7c6fe0;--accent-hover:#6b5dd3;--accent-subtle:rgba(124,111,224,0.1);
            --success:#4caf50;--warning:#ff9800;--danger:#f44336;
            --msg-user:#7c6fe0;--msg-bot:#2d2d2d;
        }
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
        .app{display:flex;height:100vh}

        /* Sidebar */
        .sidebar{width:260px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column}
        .sidebar-top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .sidebar-top h1{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
        .sidebar-top h1 .dot{width:8px;height:8px;background:var(--success);border-radius:50%;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .new-btn{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:0.75rem;font-weight:500;cursor:pointer;transition:all 0.15s}
        .new-btn:hover{background:var(--accent-hover)}
        .sidebar-nav{display:flex;border-bottom:1px solid var(--border)}
        .sidebar-nav button{flex:1;padding:10px;border:none;background:none;color:var(--text-secondary);font-size:0.72rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
        .sidebar-nav button.active{color:var(--text);border-bottom-color:var(--accent)}
        .sidebar-list{flex:1;overflow-y:auto;padding:8px}
        .s-item{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:background 0.15s}
        .s-item:hover,.s-item.active{background:var(--bg-hover)}
        .s-item .s-title{font-size:0.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .s-item .s-date{font-size:0.65rem;color:var(--text-dim);margin-top:2px}
        .task-s{padding:8px 12px;margin-bottom:3px;border-radius:6px;background:var(--bg-tertiary);border-left:3px solid var(--accent);font-size:0.75rem}
        .task-s.high{border-left-color:var(--danger)}.task-s.done{opacity:0.4;border-left-color:var(--success)}
        .task-s .t-actions{margin-top:5px;display:flex;gap:4px}
        .task-s .t-actions button{padding:2px 7px;border:none;border-radius:3px;font-size:0.6rem;cursor:pointer;color:#fff}
        .t-done{background:var(--success)}.t-del{background:var(--danger)}
        .sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .sidebar-footer span{font-size:0.7rem;color:var(--text-dim)}
        .logout-btn{padding:5px 10px;background:none;border:1px solid var(--border);color:var(--text-secondary);border-radius:5px;font-size:0.65rem;cursor:pointer;transition:all 0.15s}
        .logout-btn:hover{border-color:var(--danger);color:var(--danger)}

        /* Main */
        .main{flex:1;display:flex;flex-direction:column}
        .topbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .topbar h2{font-size:0.85rem;font-weight:500;color:var(--text-secondary)}
        .topbar-actions{display:flex;gap:6px}
        .topbar-actions button{padding:6px 12px;border:1px solid var(--border);background:none;color:var(--text-secondary);border-radius:5px;font-size:0.7rem;cursor:pointer;transition:all 0.15s}
        .topbar-actions button:hover{background:var(--bg-hover);color:var(--text)}

        /* Messages */
        .messages{flex:1;overflow-y:auto;padding:0}
        .messages-inner{max-width:780px;margin:0 auto;padding:24px 20px}
        .msg{padding:20px 0;border-bottom:1px solid rgba(61,61,61,0.4)}
        .msg:last-child{border:none}
        .msg-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
        .msg-avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600}
        .msg.user .msg-avatar{background:var(--accent);color:#fff}
        .msg.bot .msg-avatar{background:var(--bg-tertiary);color:var(--accent)}
        .msg-name{font-size:0.75rem;font-weight:600;color:var(--text-secondary)}
        .msg-body{font-size:0.88rem;line-height:1.7;color:var(--text)}
        .msg-body p{margin-bottom:10px}
        .msg-body p:last-child{margin:0}
        .msg-body ul,.msg-body ol{margin:8px 0 8px 20px}
        .msg-body li{margin-bottom:4px}
        .msg-body strong{color:#fff}
        .msg-body code{background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;font-size:0.82rem;font-family:'Fira Code',monospace}
        .msg-body pre{background:#1e1e2e;border-radius:8px;padding:16px;margin:12px 0;overflow-x:auto;border:1px solid var(--border)}
        .msg-body pre code{background:none;padding:0;font-size:0.8rem}
        .msg-body h1,.msg-body h2,.msg-body h3{margin:16px 0 8px;color:#fff}
        .msg-body h1{font-size:1.2rem}
        .msg-body h2{font-size:1.05rem}
        .msg-body h3{font-size:0.95rem}
        .msg-body blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text-secondary);margin:8px 0}

        /* Welcome */
        .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center}
        .welcome-icon{font-size:3rem;margin-bottom:16px;background:linear-gradient(135deg,var(--accent),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .welcome h2{font-size:1.4rem;font-weight:600;margin-bottom:6px}
        .welcome p{color:var(--text-secondary);font-size:0.85rem;margin-bottom:28px}
        .suggestions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:520px;width:100%}
        .sug{padding:14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:left;transition:all 0.15s}
        .sug:hover{border-color:var(--accent);background:var(--bg-tertiary)}
        .sug-icon{font-size:1rem;margin-bottom:6px}
        .sug-text{font-size:0.75rem;color:var(--text-secondary);line-height:1.4}

        /* Typing */
        .typing-wrap{padding:20px 0}
        .typing-dots{display:flex;gap:4px;align-items:center}
        .typing-dots span{width:7px;height:7px;background:var(--text-dim);border-radius:50%;animation:tbounce 1.4s infinite both}
        .typing-dots span:nth-child(2){animation-delay:.2s}
        .typing-dots span:nth-child(3){animation-delay:.4s}
        @keyframes tbounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

        /* Skeleton loading */
        .skeleton{padding:20px 0}
        .skeleton-line{height:12px;background:linear-gradient(90deg,var(--bg-tertiary) 25%,var(--bg-hover) 50%,var(--bg-tertiary) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;margin-bottom:8px}
        .skeleton-line:nth-child(1){width:90%}
        .skeleton-line:nth-child(2){width:75%}
        .skeleton-line:nth-child(3){width:60%}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

        /* Input */
        .input-wrap{padding:16px 24px 20px;border-top:1px solid var(--border)}
        .input-box-wrap{max-width:780px;margin:0 auto;position:relative}
        .input-area{width:100%;padding:14px 52px 14px 18px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:0.88rem;outline:none;resize:none;min-height:48px;max-height:180px;font-family:inherit;line-height:1.5;transition:border-color 0.2s}
        .input-area:focus{border-color:var(--accent)}
        .input-area::placeholder{color:var(--text-dim)}
        .send-btn{position:absolute;right:10px;bottom:9px;width:34px;height:34px;border-radius:7px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
        .send-btn:hover{background:var(--accent-hover)}
        .send-btn:disabled{opacity:0.3;cursor:not-allowed}
        .input-footer{display:flex;justify-content:center;margin-top:8px}
        .input-footer span{font-size:0.65rem;color:var(--text-dim)}

        /* Modal */
        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
        .modal-bg.show{display:flex}
        .modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:14px;padding:24px;width:380px;max-width:90vw}
        .modal h3{margin-bottom:16px;font-size:1rem}
        .modal input,.modal select{width:100%;padding:10px 14px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem;outline:none;margin-bottom:10px}
        .modal input:focus{border-color:var(--accent)}
        .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
        .modal-btns button{padding:8px 16px;border:none;border-radius:6px;font-size:0.8rem;font-weight:500;cursor:pointer}
        .mbtn-cancel{background:var(--bg-tertiary);color:var(--text-secondary)}
        .mbtn-primary{background:var(--accent);color:#fff}

        /* Scrollbar */
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        @media(max-width:768px){
            .sidebar{display:none}
            .suggestions{grid-template-columns:1fr}
            .messages-inner{padding:16px 12px}
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-top">
            <h1><span class="dot"></span> WorkBot</h1>
            <button class="new-btn" onclick="newChat()"><i class="fas fa-plus"></i> New</button>
        </div>
        <div class="sidebar-nav">
            <button class="active" onclick="switchTab('chats',this)">Chats</button>
            <button onclick="switchTab('tasks',this)">Tasks</button>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
        <div class="sidebar-footer">
            <span id="userLabel">user</span>
            <button class="logout-btn" onclick="doLogout()"><i class="fas fa-arrow-right-from-bracket"></i> Logout</button>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <h2 id="chatTitle">New conversation</h2>
            <div class="topbar-actions">
                <button onclick="openModal()"><i class="fas fa-plus"></i> Task</button>
                <button onclick="qSend('Show my tasks')"><i class="fas fa-list-check"></i> Tasks</button>
                <button onclick="qSend('Plan my day')"><i class="fas fa-calendar"></i> Plan</button>
            </div>
        </div>
        <div class="messages" id="messagesWrap">
            <div class="messages-inner" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon"><i class="fas fa-bolt"></i></div>
                    <h2>WorkBot AI</h2>
                    <p>Your professional AI assistant. Ask anything.</p>
                    <div class="suggestions">
                        <div class="sug" onclick="qSend('Write an After Effects expression for smooth camera shake')"><div class="sug-icon">🎬</div><div class="sug-text">After Effects expression for camera shake</div></div>
                        <div class="sug" onclick="qSend('Best export settings for YouTube in Premiere Pro')"><div class="sug-icon">📹</div><div class="sug-text">Best export settings for YouTube</div></div>
                        <div class="sug" onclick="qSend('Help me write a client proposal for video editing work')"><div class="sug-icon">📝</div><div class="sug-text">Write a client proposal</div></div>
                        <div class="sug" onclick="qSend('Plan my editing workflow for this week')"><div class="sug-icon">📋</div><div class="sug-text">Plan my weekly workflow</div></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="input-wrap">
            <div class="input-box-wrap">
                <textarea class="input-area" id="inputArea" placeholder="Message WorkBot..." rows="1" onkeydown="handleKey(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMsg()"><i class="fas fa-arrow-up"></i></button>
            </div>
            <div class="input-footer"><span>WorkBot AI — Professional assistant for creators</span></div>
        </div>
    </main>
</div>

<!-- Task Modal -->
<div class="modal-bg" id="modal">
    <div class="modal">
        <h3><i class="fas fa-plus-circle"></i> New Task</h3>
        <input id="mTaskInput" placeholder="What needs to be done?">
        <select id="mTaskPriority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select>
        <div class="modal-btns">
            <button class="mbtn-cancel" onclick="closeModal()">Cancel</button>
            <button class="mbtn-primary" onclick="addTask()">Add</button>
        </div>
    </div>
</div>

<script>
// --- State ---
let chats = JSON.parse(localStorage.getItem('wb_chats')||'[]');
let tasks = JSON.parse(localStorage.getItem('wb_tasks')||'[]');
let currentId = null;
let currentTab = 'chats';

// --- Init ---
function init(){
    renderSidebar();
    if(chats.length===0) newChat(); else selectChat(chats[0].id);
}

// --- Chats ---
function newChat(){
    const c={id:Date.now(),title:'New conversation',messages:[],created:new Date().toISOString()};
    chats.unshift(c); currentId=c.id; save(); renderSidebar(); renderMsgs();
    document.getElementById('chatTitle').textContent='New conversation';
}
function selectChat(id){
    currentId=id; const c=getChat();
    document.getElementById('chatTitle').textContent=c.title;
    renderSidebar(); renderMsgs();
}
function getChat(){return chats.find(c=>c.id===currentId)}
function save(){localStorage.setItem('wb_chats',JSON.stringify(chats));localStorage.setItem('wb_tasks',JSON.stringify(tasks))}

// --- Render ---
function renderSidebar(){
    const el=document.getElementById('sidebarList');
    if(currentTab==='chats'){
        el.innerHTML=chats.map(c=>`<div class="s-item ${c.id===currentId?'active':''}" onclick="selectChat(${c.id})"><div class="s-title">${c.title}</div><div class="s-date">${new Date(c.created).toLocaleDateString()}</div></div>`).join('')||'<p style="padding:16px;color:var(--text-dim);font-size:0.75rem;text-align:center">No chats yet</p>';
    } else {
        const pending=tasks.filter(t=>!t.done), done=tasks.filter(t=>t.done);
        let h='';
        if(pending.length) h+=pending.map(t=>`<div class="task-s ${t.priority}"><div>${t.text}</div><div class="t-actions"><button class="t-done" onclick="doneTask(${t.id})">Done</button><button class="t-del" onclick="delTask(${t.id})">Del</button></div></div>`).join('');
        if(done.length) h+='<div style="padding:6px 0;font-size:0.65rem;color:var(--text-dim);margin-top:8px">COMPLETED</div>'+done.slice(0,5).map(t=>`<div class="task-s done"><div style="text-decoration:line-through">${t.text}</div></div>`).join('');
        el.innerHTML=h||'<p style="padding:16px;color:var(--text-dim);font-size:0.75rem;text-align:center">No tasks</p>';
    }
}

function renderMsgs(){
    const c=getChat(), el=document.getElementById('messages'), w=document.getElementById('welcome');
    if(!c||c.messages.length===0){w.style.display='flex';el.querySelectorAll('.msg').forEach(m=>m.remove());return}
    w.style.display='none';
    let html='';
    c.messages.forEach(m=>{
        const body=m.role==='bot'?marked.parse(m.content):escHtml(m.content);
        html+=`<div class="msg ${m.role}"><div class="msg-header"><div class="msg-avatar">${m.role==='bot'?'W':'U'}</div><div class="msg-name">${m.role==='bot'?'WorkBot':'You'}</div></div><div class="msg-body">${body}</div></div>`;
    });
    // Keep welcome element
    el.innerHTML='<div class="welcome" id="welcome" style="display:none"><div class="welcome-icon"><i class="fas fa-bolt"></i></div><h2>WorkBot AI</h2><p>Your professional AI assistant.</p></div>'+html;
    scrollBottom();
    document.querySelectorAll('.msg-body pre code').forEach(b=>hljs.highlightElement(b));
}

function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function scrollBottom(){const w=document.getElementById('messagesWrap');w.scrollTop=w.scrollHeight}

// --- Send ---
async function sendMsg(){
    const inp=document.getElementById('inputArea'), msg=inp.value.trim();
    if(!msg) return;
    if(!currentId) newChat();
    const c=getChat();
    document.getElementById('welcome').style.display='none';
    c.messages.push({role:'user',content:msg});
    if(c.messages.length===1){c.title=msg.slice(0,45)+(msg.length>45?'...':'');document.getElementById('chatTitle').textContent=c.title}
    save(); renderMsgs(); renderSidebar();
    inp.value=''; autoH(inp);
    document.getElementById('sendBtn').disabled=true;

    // Skeleton loading
    const skel=document.createElement('div');skel.className='msg bot';skel.id='skelMsg';
    skel.innerHTML='<div class="msg-header"><div class="msg-avatar">W</div><div class="msg-name">WorkBot</div></div><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';
    document.getElementById('messages').appendChild(skel);scrollBottom();

    try{
        const history=c.messages.slice(-8).map(m=>({role:m.role==='bot'?'assistant':'user',content:m.content}));
        const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,tasks:tasks,history:history})});
        const data=await res.json();
        document.getElementById('skelMsg')?.remove();
        if(data.error==='Not authenticated'){window.location.href='/login';return}
        c.messages.push({role:'bot',content:data.response});
        save(); renderMsgs();
        if(data.task_action) handleTaskAction(data.task_action);
    }catch(e){
        document.getElementById('skelMsg')?.remove();
        c.messages.push({role:'bot',content:'Connection error. Server might be waking up — try again in 30s.'});
        save(); renderMsgs();
    }
    document.getElementById('sendBtn').disabled=false;
}

function qSend(m){document.getElementById('inputArea').value=m;sendMsg()}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}autoH(e.target)}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,180)+'px'}

// --- Tasks ---
function handleTaskAction(a){
    if(a.type==='add'){tasks.push({id:Date.now(),text:a.task,priority:a.priority||'medium',done:false,created:new Date().toLocaleDateString()});save();renderSidebar()}
    else if(a.type==='done'){const t=tasks.find(t=>!t.done&&t.text.toLowerCase().includes(a.text?.toLowerCase()));if(t){t.done=true;save();renderSidebar()}}
    else if(a.type==='delete'){tasks=tasks.filter(t=>!t.text.toLowerCase().includes(a.text?.toLowerCase()||'___'));save();renderSidebar()}
}
function doneTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=true;save();renderSidebar()}}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);save();renderSidebar()}
function openModal(){document.getElementById('modal').classList.add('show');document.getElementById('mTaskInput').focus()}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function addTask(){
    const text=document.getElementById('mTaskInput').value.trim();if(!text)return;
    tasks.push({id:Date.now(),text,priority:document.getElementById('mTaskPriority').value,done:false,created:new Date().toLocaleDateString()});
    save();renderSidebar();document.getElementById('mTaskInput').value='';closeModal();
}

// --- Tabs ---
function switchTab(tab,btn){
    currentTab=tab;
    document.querySelectorAll('.sidebar-nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');renderSidebar();
}

// --- Auth ---
async function doLogout(){await fetch('/api/logout',{method:'POST'});window.location.href='/login'}

// --- Marked config ---
marked.setOptions({breaks:true,gfm:true});

init();
</script>
</body>
</html>
